---
on:
  workflow_call:

permissions:
  contents: read

env:
  PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # PACKER_LOG: 1

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      x64_oses: ${{ steps.set-matrix.outputs.x64_oses }}
      arm64_oses: ${{ steps.set-matrix.outputs.arm64_oses }}
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Set matrix
        id: set-matrix
        run: |
          # arm64 exclusions: no aarch64 pkrvars exist for these OS versions
          ARM64_EXCLUDE="almalinux-8 oraclelinux-8 rockylinux-8"
          X64=$(ruby -r yaml -r json -e "puts YAML.load_file('builds.yml')['public'].reject { |o| o.start_with?('amazonlinux') }.to_json")
          ARM64=$(ruby -r yaml -r json -e "excl=%w[almalinux-8 oraclelinux-8 rockylinux-8]; puts YAML.load_file('builds.yml')['public'].reject { |o| o.start_with?('amazonlinux') || excl.include?(o) }.to_json")
          echo "x64_oses=${X64}" >> "$GITHUB_OUTPUT"
          echo "arm64_oses=${ARM64}" >> "$GITHUB_OUTPUT"

  x86_64:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.generate-matrix.outputs.x64_oses) }}
        provider:
          - virtualbox-iso
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Install Vagrant VirtualBox
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg
          wget -O- https://www.virtualbox.org/download/oracle_vbox_2016.asc | gpg --dearmor | sudo tee /usr/share/keyrings/oracle-virtualbox-2016.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          echo "deb [signed-by=/usr/share/keyrings/oracle-virtualbox-2016.gpg] https://download.virtualbox.org/virtualbox/debian $(lsb_release -cs) contrib" | sudo tee /etc/apt/sources.list.d/virtualbox.list
          sudo apt-get update
          sudo apt-get install -y software-properties-common vagrant virtualbox-7.2
      - name: Install Chef
        uses: actionshub/chef-install@3.0.0
      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest
      - name: Install Bento
        run: |
          eval "$(chef shell-init bash)"
          gem build bento.gemspec
          gem install bento-*.gem
      - name: Bento build
        run: |
          rm -rf builds
          sudo mkdir -p /mnt/builds/iso
          sudo mkdir -p /mnt/builds/build_complete
          sudo chmod -R 777 /mnt/builds
          sudo ln -s /mnt/builds ./
          eval "$(chef shell-init bash)"
          export LOGNAME=$USER
          bento build -o ${{ matrix.provider }}.vm os_pkrvars/$(echo ${{ matrix.os }} | cut -d "-" -f 1)/"${{ matrix.os }}-x86_64.pkrvars.hcl"
          ls -alh builds/build_complete/
          cat builds/build_complete/${{ matrix.os }}*-x86_64._metadata.json
      - name: Remove VM in case of canceled job
        if: cancelled()
        run: |
          VM="$(VBoxManage list vms | grep '${{ matrix.os }}' | awk -F'"' '{print $2}')"
          echo "VM Name: $VM"
          VBoxManage controlvm "$VM" poweroff 2>/dev/null || true
          sleep 2
          VBoxManage unregistervm "$VM" --delete 2>/dev/null || true
      - name: Bento Test
        run: |
          eval "$(chef shell-init bash)"
          export LOGNAME=$USER
          bento test
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.os }}-virtualbox-x86_64"
          path: |
            builds/testing_passed/x86_64/*.box
            builds/testing_passed/x86_64/*.json
          overwrite: true
          retention-days: 10
          compression-level: 0 # no compression

  aarch64:
    needs: generate-matrix
    runs-on: [self-hosted, ARM64, virtualbox]
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.generate-matrix.outputs.arm64_oses) }}
        provider:
          - virtualbox-iso
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Bento build
        run: |
          eval "$(chef shell-init bash)"
          bento build -o ${{ matrix.provider }}.vm os_pkrvars/$(echo ${{ matrix.os }} | cut -d "-" -f 1)/"${{ matrix.os }}-aarch64.pkrvars.hcl"
          ls -alh builds/build_complete/
          cat builds/build_complete/${{ matrix.os }}*-aarch64._metadata.json
      - name: Remove VM in case of canceled job
        if: cancelled()
        run: |
          VM="$(VBoxManage list vms | grep '${{ matrix.os }}' | awk -F'"' '{print $2}')"
          echo "VM Name: $VM"
          VBoxManage controlvm "$VM" poweroff 2>/dev/null || true
          sleep 2
          VBoxManage unregistervm "$VM" --delete 2>/dev/null || true
      - name: Bento Test
        run: |
          eval "$(chef shell-init bash)"
          bento test
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.os }}-virtualbox-aarch64"
          path: |
            builds/testing_passed/aarch64/*.box
            builds/testing_passed/aarch64/*.json
          overwrite: true
          retention-days: 10
          compression-level: 0 # no compression
